global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
    scrape_interval: 30s

  - job_name: docker
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 30s

  - job_name: controlbox-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    scrape_interval: 15s
